<div class="admin-container">
  <div class="admin-header">
    <h2>Create New Activity</h2>
    <a routerLink="/admin" class="btn-back">← Back to Dashboard</a>
  </div>

  <div class="form-container">
    <form (ngSubmit)="onSubmit()" #activityForm="ngForm" class="activity-form">

      <div class="form-group">
        <label for="title">Activity Title</label>
        <input type="text" id="title" name="title" [(ngModel)]="newActivity.title" required placeholder="e.g. River Cleanup">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" [(ngModel)]="newActivity.category">
            <option value="Environmental">Environmental</option>
            <option value="Education">Education</option>
            <option value="Health">Health</option>
          </select>
        </div>
        <div class="form-group">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty" name="difficulty" [(ngModel)]="newActivity.difficulty">
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" [(ngModel)]="newActivity.description" required rows="3" placeholder="Describe the volunteer work..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="date">Event Date</label>
          <input type="date" id="date" name="date" [(ngModel)]="newActivity.date" required>
        </div>
        <div class="form-group">
          <label for="time">Time (e.g. 09:00 AM - 12:00 PM)</label>
          <input type="text" id="time" name="time" [(ngModel)]="newActivity.time" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" name="location" [(ngModel)]="newActivity.location" required>
        </div>
        <div class="form-group">
          <label for="organization">Organization (NGO Name)</label>
          <input type="text" id="organization" name="organization" [(ngModel)]="newActivity.organization" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="registrationDeadline">Registration Deadline</label>
          <input type="date" id="registrationDeadline" name="registrationDeadline" [(ngModel)]="newActivity.registrationDeadline" required>
        </div>
        <div class="form-group">
          <label for="totalSlots">Total Volunteer Slots Available</label>
          <input type="number" id="totalSlots" name="totalSlots" [(ngModel)]="newActivity.totalSlots" required min="1">
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit" [disabled]="!activityForm.valid || submitting">
          {{ submitting ? 'Saving...' : 'Create Activity' }}
        </button>
      </div>

    </form>
  </div>
</div>
