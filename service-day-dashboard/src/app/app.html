@if (router.url !== '/login') {

  @if (authService.currentUser$ | async; as user) {
    <header class="app-header">
      <div class="header-content">
        <div class="logo-container">
          <span class="logo-icon">🤝</span>
          <h1 class="logo-text">Service Day</h1>
        </div>

        <nav class="header-nav">
          @if (user.role === 'Staff') {
            <button routerLink="/activities" class="nav-btn">
              <span>📅</span> Activities
            </button>
            <button routerLink="/history" class="nav-btn">
              <span>✅</span> My Registrations
            </button>
            <button routerLink="/notifications" class="nav-btn notif-btn">
              <span>🔔</span> Notifications
            </button>
          }

          @if (user.role === 'Admin') {
            <button routerLink="/admin" class="nav-btn admin-btn">
              <span>⚙️</span> Admin Dashboard
            </button>
          }

          <div class="divider"></div>

          <div class="user-profile">
            <span class="user-greeting">Hi, <strong>{{ user.name }}</strong></span>
            <button (click)="authService.logout()" routerLink="/login" class="nav-btn logout-btn">
              Logout
            </button>
          </div>
        </nav>
      </div>
    </header>
  }

}

<main class="app-content">
  <router-outlet></router-outlet>
</main>
