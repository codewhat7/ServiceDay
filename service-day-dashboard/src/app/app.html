@if (router.url !== '/login') {

  @if (authService.currentUser$ | async; as user) {
    <header class="app-header">
      <div class="header-content">
        <h1 class="logo">Service Day Dashboard</h1>

        <nav class="header-nav">
          @if (user.role === 'Staff') {
            <button routerLink="/activities" class="nav-btn">Activities</button>
            <button routerLink="/history" class="nav-btn">Registered Activity</button>
          }

          @if (user.role === 'Admin') {
            <button routerLink="/admin" class="nav-btn">Admin Dashboard</button>
          }

          <button (click)="authService.logout()" routerLink="/login" class="nav-btn" style="background: #dc3545; color: white;">
            Logout ({{ user.name }})
          </button>
        </nav>
      </div>
    </header>
  }

}

<main class="app-content">
  <router-outlet></router-outlet>
</main>
